name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask werkzeug python-dotenv requests gunicorn pytest pytest-flask

      - name: Run tests
        env:
          SECRET_KEY: test-secret-key-ci
          GROQ_API_KEY: ""
        run: pytest test_app.py -v --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install flake8
        run: pip install flake8
      - name: Lint
        run: flake8 app.py --max-line-length=120 --ignore=E501,W503,E302,E303,W291,W293
