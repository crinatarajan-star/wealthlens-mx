name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install flask werkzeug python-dotenv requests gunicorn pytest pytest-flask
      - name: Run tests
        env:
          SECRET_KEY: test-secret-key-ci
          GROQ_API_KEY: ""
        run: pytest test_app.py -v --tb=short
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install flake8
      - run: flake8 app.py --max-line-length=120 --ignore=E501,W503,E302,E303,W291,W293,W292,E265,E266
